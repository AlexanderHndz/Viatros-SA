<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso | Viatros, S. A.</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Viatros, S. A.</div>
        <a href="index.html">⬅ Volver al Inicio</a>
    </nav>

    <div class="glass-container">
        <h2>Bienvenido de vuelta</h2>
        <p style="color: #666; margin-bottom: 30px;">Ingrese sus credenciales para gestionar sus reservas.</p>
        
        <form id="form-login" onsubmit="iniciarSesion(event)">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary">Ingresar a mi cuenta</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem;">
            ¿Aún no tiene una cuenta? <a href="registro.html" style="color: var(--primary); font-weight: bold;">Regístrese aquí</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Viatros, S. A.</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .reserva-card {
            background: white; border-left: 5px solid var(--accent); padding: 20px;
            margin-bottom: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s ease; /* Transición suave */
        }
        
        /* Pequeña animación para el letrero de "HOY" */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Viatros, S. A.</div>
        <div>
            <a href="catalogo.html">Catálogo</a>
        </div>
    </nav>

    <div class="glass-container" style="max-width: 800px;">
        <h2 style="color: var(--primary);"><span id="perfil-nombre"></span>, este es tu itinerario</h2>
        <p>Aquí puedes ver todos los viajes que tienes reservados con nosotros.</p>
        
        <div id="lista-reservas" style="margin-top: 30px; text-align: left;">
            <p>Cargando tus aventuras...</p>
        </div>
    </div>

    <script>
        window.onload = async () => {
            const usuarioLogueado = JSON.parse(localStorage.getItem('usuarioViatros'));
            if (!usuarioLogueado) { window.location.href = 'login.html'; return; }
            
            document.getElementById('perfil-nombre').innerText = "Hola " + usuarioLogueado.nombre;

            try {
                const res = await fetch(`/api/mis-reservas/${usuarioLogueado.id_usuario}`);
                const reservas = await res.json();
                
                const contenedor = document.getElementById('lista-reservas');
                contenedor.innerHTML = '';

                if (reservas.length === 0) {
                    contenedor.innerHTML = '<p style="text-align:center;">Aún no tienes viajes reservados. <br><br> <a href="catalogo.html" class="btn-primary" style="display:inline-block; text-decoration:none;">Explorar Destinos</a></p>';
                    return;
                }

                reservas.forEach(r => {
                    const fechaViajeObj = new Date(r.fecha_viaje);
                    const fechaHoy = new Date();
                    // Ajuste para la zona horaria de Guatemala si es necesario, pero simplificado aquí
                    const fechaViajeTxt = fechaViajeObj.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' }); 
                    
                    // Calcular diferencia en días (ignorando horas)
                    const tiempoViaje = new Date(fechaViajeObj.getFullYear(), fechaViajeObj.getMonth(), fechaViajeObj.getDate()).getTime();
                    const tiempoHoy = new Date(fechaHoy.getFullYear(), fechaHoy.getMonth(), fechaHoy.getDate()).getTime();
                    const diferenciaTiempo = tiempoViaje - tiempoHoy;
                    const diasFaltantes = Math.round(diferenciaTiempo / (1000 * 3600 * 24));

                    let badgeEstado = '';
                    let estiloTarjeta = 'border-left: 5px solid var(--accent);';

                    if (diasFaltantes < 0) {
                        badgeEstado = '<span style="background: #e0e0e0; color: #555; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem;">✅ Viaje Completado</span>';
                        estiloTarjeta = 'border-left: 5px solid #ccc; opacity: 0.7;'; 
                    } else if (diasFaltantes === 0) {
                        badgeEstado = '<span style="background: #28a745; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; display: inline-block; animation: pulse 1s infinite;">🚀 ¡Tu viaje es HOY!</span>';
                    } else {
                        badgeEstado = `<span style="background: #e3f2fd; color: var(--primary); padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;">⏳ Faltan ${diasFaltantes} días</span>`;
                    }

                    contenedor.innerHTML += `
                        <div class="reserva-card" style="${estiloTarjeta}">
                            <div>
                                <div style="margin-bottom: 8px;">${badgeEstado}</div>
                                <h3 style="margin:0; color:var(--primary);">${r.nombre_lugar}</h3>
                                <p style="margin: 5px 0; color: #666;">📅 Fecha: ${fechaViajeTxt}</p>
                                <p style="margin: 0; font-size: 0.9rem;">📦 Paquete ${r.tipo_paquete} | 👥 ${r.cupos_reservados} cupos</p>
                            </div>
                            <div style="text-align: right;">
                                <span style="display:block; font-size: 0.8rem; color: #888;">Total pagado</span>
                                <strong style="color: var(--accent); font-size: 1.3rem;">Q${r.precio_total.toLocaleString('es-GT')}.00</strong>
                                
                                <button onclick="window.open('/api/descargar-boleto/${r.id_reserva}')" class="btn-primary" style="margin-top: 15px; padding: 8px 12px; font-size: 0.85rem; display: block; border-radius: 5px;">
                                    📥 Descargar Pase
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-reservas').innerHTML = '<p>Error al cargar el historial.</p>';
            }
        };
    </script>
    <script src="js/auth.js"></script>
</body>
</html>

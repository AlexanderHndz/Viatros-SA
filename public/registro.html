<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Viatros, S. A.</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f4f7f6 0%, #e0e5ec 100%);
        }

        .pantalla-centrada {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-container {
            width: 100%;
            max-width: 420px;
            margin: 0;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        .toast-elegante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 380px;
            max-width: calc(100vw - 40px);
            background: linear-gradient(135deg, var(--primary) 0%, #001f3f 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 5px solid var(--accent);
            transform: translateX(150vw);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
        }

        @media (max-width: 480px) {
            .toast-elegante {
                bottom: 20px;
                right: 20px;
                padding: 12px 15px;
                gap: 12px;
            }

            .toast-elegante strong {
                font-size: 1rem !important;
            }

            .toast-elegante span {
                font-size: 0.85rem !important;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html">Viatros, S. A.</a>
        </div>
        <a href="catalogo.html">⬅ Volver al Catálogo</a>
    </nav>

    <div class="pantalla-centrada">
        <div class="glass-container">

            <div id="bloque-registro">
                <h2 style="color: var(--primary); text-align: center;">Únase a la Aventura</h2>
                <p style="color: #666; margin-bottom: 25px; text-align: center; font-size: 0.95rem;">Cree su cuenta para
                    reservar los mejores destinos de Guatemala.</p>

                <form id="form-registro" onsubmit="registrarUsuario(event)">
                    <div class="input-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required
                            style="width: 100%; box-sizing: border-box;">
                    </div>

                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required
                            style="width: 100%; box-sizing: border-box;">
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8"
                            style="width: 100%; box-sizing: border-box;">
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Crear mi
                        cuenta</button>
                </form>

                <p
                    style="margin-top: 25px; font-size: 0.9rem; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
                    ¿Ya tiene una cuenta? <a href="login.html" style="color: var(--primary); font-weight: bold;">Ingrese
                        aquí</a>
                </p>
            </div>

            <div id="bloque-verificacion" style="display: none; text-align: center;">
                <h2 style="color: var(--primary);">🔐 Verifica tu Correo</h2>
                <p style="color: #666; margin-bottom: 20px; font-size: 0.9rem;">Ingresa el código de 6 dígitos que te
                    enviamos para activar tu cuenta.</p>

                <form onsubmit="verificarCodigoOTP(event)">
                    <input type="text" id="codigo-otp" placeholder="123456" maxlength="6" required
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        style="width: 100%; padding: 15px; font-size: 2rem; letter-spacing: 15px; text-align: center; border-radius: 8px; border: 2px solid var(--accent); outline: none; margin-bottom: 20px; box-sizing: border-box;">

                    <button type="submit" class="btn-primary" style="width: 100%;">Validar Código</button>
                </form>
            </div>

        </div>
    </div>

    <div id="toast-notificacion" class="toast-elegante">
        <span id="toast-icono"
            style="font-size: 1.5rem; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; flex-shrink: 0;">✅</span>
        <div style="display: flex; flex-direction: column;">
            <strong id="toast-titulo"
                style="font-size: 1.05rem; margin-bottom: 2px; letter-spacing: 0.5px;">Mensaje</strong>
            <span id="toast-mensaje" style="font-size: 0.9rem; opacity: 0.9; line-height: 1.3;">Descripción aquí.</span>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>

</body>

</html>

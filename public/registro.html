<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Viatros, S. A.</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Viatros, S. A.</div>
        <a href="index.html">⬅ Volver al Inicio</a>
    </nav>

    <div class="glass-container">
        <h2>Únase a la Aventura</h2>
        <p style="color: #666; margin-bottom: 30px;">Cree su cuenta para reservar los mejores destinos de Guatemala.</p>
        
        <form id="form-registro" onsubmit="registrarUsuario(event)">
            <div class="input-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
            </div>
            
            <button type="submit" class="btn-primary">Crear mi cuenta</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem;">
            ¿Ya tiene una cuenta? <a href="login.html" style="color: var(--primary); font-weight: bold;">Ingrese aquí</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>

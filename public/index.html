<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viatros, S. A. | El viaje de su vida</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>

        .hero {
            height: 80vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
            background: url('https://images.unsplash.com/photo-1528543606781-2f6e6857f318?auto=format&fit=crop&w=1920&q=80') center/cover;
            color: white; position: relative;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 51, 102, 0.6);
            z-index: 1;
        }
        .hero-content { z-index: 2; animation: fadeIn 1s ease-out; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; margin-bottom: 30px; }
        .btn-hero { width: auto; display: inline-block; text-decoration: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Viatros, S. A.</div>
        <div>
            <a href="catalogo.html">Catálogo de Destinos</a>
            <a href="login.html">Iniciar Sesión</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Descubra la verdadera Guatemala</h1>
            <p>Conectamos su espíritu aventurero con los tesoros ocultos del país.</p>
            <a href="catalogo.html" class="btn-primary btn-accent btn-hero">Ver Rutas Disponibles</a>
        </div>
    </header>

</body>
</html>
